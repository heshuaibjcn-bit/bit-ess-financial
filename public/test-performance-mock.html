<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Performance Demo (Mock Data)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bar { transition: width 1s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn 0.5s ease-out; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">
  <div class="max-w-5xl mx-auto">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">⚡ Agent Performance Demo</h1>
      <p class="text-gray-600">Demonstrating sequential vs parallel execution (with simulated data)</p>
    </div>

    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <button
        id="runDemo"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg text-lg"
        onclick="runDemo()"
      >
        ▶ Run Performance Demo
      </button>
    </div>

    <div id="results" class="space-y-6"></div>
  </div>

  <script>
    // Simulated agent execution times (in milliseconds)
    const AGENTS = [
      { name: 'PolicyUpdateAgent', time: 150 },
      { name: 'TariffUpdateAgent', time: 200 },
      { name: 'DueDiligenceAgent', time: 180 },
      { name: 'SentimentAnalysisAgent', time: 220 },
      { name: 'TechnicalFeasibilityAgent', time: 170 },
      { name: 'FinancialFeasibilityAgent', time: 250 },
      { name: 'ReportGenerationAgent', time: 300 }
    ];

    function formatTime(ms) {
      if (ms < 1000) return `${ms}ms`;
      return `${(ms / 1000).toFixed(2)}s`;
    }

    async function runDemo() {
      const btn = document.getElementById('runDemo');
      btn.disabled = true;
      btn.textContent = '⏳ Running Demo...';

      document.getElementById('results').innerHTML = `
        <div class="text-center py-8 text-gray-500">
          <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
          <p>Running sequential execution...</p>
        </div>
      `;

      // Simulate sequential execution
      await new Promise(resolve => setTimeout(resolve, 2000));
      const sequentialTime = AGENTS.reduce((sum, agent) => sum + agent.time, 0);

      // Simulate parallel execution (time of slowest agent)
      await new Promise(resolve => setTimeout(resolve, 1500));
      const parallelTime = Math.max(...AGENTS.map(a => a.time));

      const speedup = sequentialTime / parallelTime;
      const timeSaved = sequentialTime - parallelTime;
      const efficiency = (speedup / AGENTS.length) * 100;

      document.getElementById('results').innerHTML = `
        <div class="fade-in">
          <!-- Comparison Cards -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-red-50 border-2 border-red-200 rounded-lg p-6">
              <h3 class="text-xl font-bold text-red-900 mb-4">Sequential Execution</h3>
              <div class="space-y-3">
                <div class="flex justify-between items-center">
                  <span class="text-red-700">Total Time:</span>
                  <span class="text-2xl font-bold text-red-900">${formatTime(sequentialTime)}</span>
                </div>
                <div class="flex justify-between items-center">
                  <span class="text-red-700">Agents:</span>
                  <span class="text-red-900">${AGENTS.length} × sequential</span>
                </div>
                <div class="mt-4 pt-4 border-t border-red-200">
                  <div class="text-sm text-red-600 mb-2">Individual Times:</div>
                  ${AGENTS.map(a => `
                    <div class="flex justify-between text-sm text-red-700 py-1">
                      <span>${a.name}</span>
                      <span>${formatTime(a.time)}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>

            <div class="bg-green-50 border-2 border-green-200 rounded-lg p-6">
              <h3 class="text-xl font-bold text-green-900 mb-4">Parallel Execution</h3>
              <div class="space-y-3">
                <div class="flex justify-between items-center">
                  <span class="text-green-700">Total Time:</span>
                  <span class="text-2xl font-bold text-green-900">${formatTime(parallelTime)}</span>
                </div>
                <div class="flex justify-between items-center">
                  <span class="text-green-700">Agents:</span>
                  <span class="text-green-900">${AGENTS.length} × parallel</span>
                </div>
                <div class="mt-4 pt-4 border-t border-green-200">
                  <div class="text-sm text-green-600 mb-2">Execution Timeline:</div>
                  <div class="relative h-8 bg-green-100 rounded overflow-hidden">
                    <div class="bar absolute inset-y-0 left-0 bg-green-500" style="width: 100%"></div>
                    <div class="absolute inset-0 flex items-center justify-center text-xs font-semibold text-white">
                      All agents run concurrently
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Performance Comparison -->
          <div class="bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg shadow-lg p-8 border-2 border-blue-200 mb-8">
            <h3 class="text-2xl font-bold mb-6 text-center">📊 Performance Metrics</h3>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
              <div class="bg-white rounded-lg p-6 text-center shadow">
                <div class="text-sm text-gray-600 mb-2">Speedup Factor</div>
                <div class="text-4xl font-bold text-green-600">${speedup.toFixed(2)}x</div>
                <div class="text-xs text-gray-500 mt-1">faster with parallel</div>
              </div>
              <div class="bg-white rounded-lg p-6 text-center shadow">
                <div class="text-sm text-gray-600 mb-2">Time Saved</div>
                <div class="text-4xl font-bold text-blue-600">${formatTime(timeSaved)}</div>
                <div class="text-xs text-gray-500 mt-1">${((timeSaved / sequentialTime) * 100).toFixed(1)}% reduction</div>
              </div>
              <div class="bg-white rounded-lg p-6 text-center shadow">
                <div class="text-sm text-gray-600 mb-2">Efficiency</div>
                <div class="text-4xl font-bold text-purple-600">${efficiency.toFixed(1)}%</div>
                <div class="text-xs text-gray-500 mt-1">of ideal speedup</div>
              </div>
            </div>

            <!-- Visual Comparison -->
            <div class="space-y-4">
              <h4 class="font-semibold text-gray-700">Visual Comparison:</h4>
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-sm w-24">Sequential</span>
                  <div class="flex-1 bg-gray-200 rounded-full h-6 overflow-hidden">
                    <div class="bar h-full bg-red-500" style="width: 100%"></div>
                  </div>
                  <span class="text-sm font-mono w-20 text-right">${formatTime(sequentialTime)}</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-sm w-24">Parallel</span>
                  <div class="flex-1 bg-gray-200 rounded-full h-6 overflow-hidden">
                    <div class="bar h-full bg-green-500" style="width: ${(parallelTime / sequentialTime) * 100}%"></div>
                  </div>
                  <span class="text-sm font-mono w-20 text-right">${formatTime(parallelTime)}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Key Insights -->
          <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h3 class="text-xl font-bold mb-4">💡 Key Insights</h3>
            <ul class="space-y-2">
              <li class="flex items-start">
                <span class="text-green-500 mr-2">✓</span>
                <span>Parallel execution is <strong>${speedup.toFixed(2)}x faster</strong> than sequential</span>
              </li>
              <li class="flex items-start">
                <span class="text-blue-500 mr-2">✓</span>
                <span>Time reduced from <strong>${formatTime(sequentialTime)}</strong> to <strong>${formatTime(parallelTime)}</strong></span>
              </li>
              <li class="flex items-start">
                <span class="text-purple-500 mr-2">✓</span>
                <span><strong>${efficiency > 80 ? 'Excellent' : efficiency > 50 ? 'Good' : 'Fair'}</strong> parallelization efficiency (${efficiency.toFixed(1)}%)</span>
              </li>
              <li class="flex items-start">
                <span class="text-orange-500 mr-2">✓</span>
                <span>All ${AGENTS.length} agents execute simultaneously instead of waiting for each to complete</span>
              </li>
            </ul>
          </div>

          <!-- Implementation Details -->
          <div class="bg-gray-50 rounded-lg p-6">
            <h3 class="text-xl font-bold mb-4">🔧 Implementation Details</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <h4 class="font-semibold mb-2">Sequential Execution:</h4>
                <pre class="bg-gray-800 text-green-400 p-3 rounded text-xs overflow-x-auto"><code>// Agents execute one by one
for (const agent of agents) {
  await agent.execute(input);
}
// Total: sum of all times</code></pre>
              </div>
              <div>
                <h4 class="font-semibold mb-2">Parallel Execution:</h4>
                <pre class="bg-gray-800 text-green-400 p-3 rounded text-xs overflow-x-auto"><code>// All agents execute simultaneously
await Promise.all(agents.map(agent =>
  agent.execute(input)
));
// Total: max of all times</code></pre>
              </div>
            </div>
          </div>
        </div>
      `;

      btn.disabled = false;
      btn.textContent = '🔄 Run Again';
    }
  </script>
</body>
</html>
