<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Services Demo - 平台通用服务</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">
  <div class="max-w-6xl mx-auto">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">🔧 Platform Services Demo</h1>
      <p class="text-gray-600">平台通用服务 - AI 客户端、缓存、智能体基类</p>
    </div>

    <!-- Service Status -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">📊 服务状态</h2>
      <div id="serviceStatus" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <!-- AI Client Demo -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">🤖 AI 客户端</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            发送消息到 AI
          </label>
          <textarea
            id="aiMessage"
            rows="3"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
            placeholder="输入你想问 AI 的问题..."
          ></textarea>
        </div>
        <button
          onclick="testAIClient()"
          class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
        >
          发送消息
        </button>
        <div id="aiResponse" class="mt-4 p-4 bg-gray-50 rounded-lg hidden">
          <h4 class="font-semibold mb-2">AI 响应：</h4>
          <p id="aiResponseText" class="text-gray-700"></p>
        </div>
      </div>
    </div>

    <!-- Cache Demo -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">💾 缓存管理器</h2>
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              键名
            </label>
            <input
              type="text"
              id="cacheKey"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg"
              placeholder="cache-key"
            >
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              值
            </label>
            <input
              type="text"
              id="cacheValue"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg"
              placeholder="cached value"
            >
          </div>
        </div>
        <div class="flex gap-3">
          <button
            onclick="cacheSet()"
            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"
          >
            设置缓存
          </button>
          <button
            onclick="cacheGet()"
            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
          >
            获取缓存
          </button>
          <button
            onclick="cacheClear()"
            class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700"
          >
            清除缓存
          </button>
        </div>
        <div id="cacheResult" class="mt-4 p-4 bg-gray-50 rounded-lg hidden"></div>
      </div>
    </div>

    <!-- Agent Registry Demo -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">🤖 智能体注册表</h2>
      <div id="agentRegistry" class="space-y-2"></div>
    </div>

    <!-- Batch Processing Demo -->
    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-xl font-semibold mb-4">⚡ 批量处理</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            批量消息（每行一条）
          </label>
          <textarea
            id="batchMessages"
            rows="4"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg"
            placeholder="消息1&#10;消息2&#10;消息3"
          ></textarea>
        </div>
        <button
          onclick="testBatchProcessing()"
          class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700"
        >
          批量处理
        </button>
        <div id="batchResults" class="mt-4 space-y-2 hidden"></div>
      </div>
    </div>

    <!-- Event Log -->
    <div class="bg-white rounded-lg shadow p-6 mt-8">
      <h3 class="text-lg font-semibold mb-4">📋 事件日志</h3>
      <div id="eventLog" class="h-64 overflow-y-auto bg-gray-900 text-green-400 p-4 rounded font-mono text-sm"></div>
    </div>
  </div>

  <script>
    let logMessages = [];

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const prefix = {
        'info': 'ℹ️',
        'success': '✅',
        'error': '❌',
        'warning': '⚠️'
      }[type] || 'ℹ️';

      logMessages.push(`[${timestamp}] ${prefix} ${message}`);
      updateLog();
    }

    function updateLog() {
      const logDiv = document.getElementById('eventLog');
      logDiv.innerHTML = logMessages.map(m => `<div>${m}</div>`).join('');
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 模拟服务状态
    function updateServiceStatus() {
      const services = [
        { name: 'AI Client', status: 'ready', icon: '🤖' },
        { name: 'Cache Manager', status: 'ready', icon: '💾' },
        { name: 'Service Registry', status: 'ready', icon: '📋' }
      ];

      document.getElementById('serviceStatus').innerHTML = services.map(s => `
        <div class="p-4 rounded-lg border-2 border-green-200 bg-green-50">
          <div class="flex items-center justify-between">
            <div>
              <div class="font-semibold text-gray-900">${s.icon} ${s.name}</div>
              <div class="text-sm text-gray-600">状态: ${s.status}</div>
            </div>
            <div class="text-2xl">✅</div>
          </div>
        </div>
      `).join('');
    }

    // AI Client 测试
    async function testAIClient() {
      const message = document.getElementById('aiMessage').value;
      if (!message) {
        alert('请输入消息');
        return;
      }

      log('发送消息到 AI...', 'info');

      // 模拟 AI 响应（实际使用时会调用 AIClient）
      setTimeout(() => {
        const responses = [
          '这是一个很好的问题！',
          '我理解你的意思了。',
          '让我来分析一下...'
        ];
        const response = responses[Math.floor(Math.random() * responses.length)];

        document.getElementById('aiResponse').classList.remove('hidden');
        document.getElementById('aiResponseText').textContent = response;

        log('收到 AI 响应', 'success');
      }, 1000);
    }

    // 缓存测试
    let cacheStore = new Map();

    function cacheSet() {
      const key = document.getElementById('cacheKey').value;
      const value = document.getElementById('cacheValue').value;

      if (!key || !value) {
        alert('请输入键名和值');
        return;
      }

      cacheStore.set(key, {
        value,
        timestamp: Date.now()
      });

      showCacheResult(`已设置缓存: ${key} = ${value}`);
      log(`缓存设置: ${key}`, 'success');
    }

    function cacheGet() {
      const key = document.getElementById('cacheKey').value;
      if (!key) {
        alert('请输入键名');
        return;
      }

      const entry = cacheStore.get(key);
      if (entry) {
        const age = Math.floor((Date.now() - entry.timestamp) / 1000);
        showCacheResult(`缓存命中: ${entry.value} (缓存 ${age} 秒)`);
        log(`缓存命中: ${key}`, 'success');
      } else {
        showCacheResult(`缓存未命中: ${key}`);
        log(`缓存未命中: ${key}`, 'warning');
      }
    }

    function cacheClear() {
      cacheStore.clear();
      showCacheResult('缓存已清除');
      log('缓存已清除', 'info');
    }

    function showCacheResult(message) {
      const resultDiv = document.getElementById('cacheResult');
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = `<p class="text-gray-700">${message}</p>`;
    }

    // 智能体注册表
    function updateAgentRegistry() {
      const agents = [
        { name: 'PolicyUpdateAgent', category: 'policy', status: 'active' },
        { name: 'TariffUpdateAgent', category: 'tariff', status: 'active' },
        { name: 'DueDiligenceAgent', category: 'analysis', status: 'active' },
        { name: 'SentimentAnalysisAgent', category: 'analysis', status: 'active' },
        { name: 'TechnicalFeasibilityAgent', category: 'technical', status: 'active' },
        { name: 'FinancialFeasibilityAgent', category: 'financial', status: 'active' },
        { name: 'ReportGenerationAgent', category: 'report', status: 'active' }
      ];

      document.getElementById('agentRegistry').innerHTML = agents.map(a => `
        <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
          <div>
            <div class="font-medium text-gray-900">${a.name}</div>
            <div class="text-sm text-gray-600">分类: ${a.category}</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full ${
            a.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'
          }">
            ${a.status}
          </span>
        </div>
      `).join('');
    }

    // 批量处理测试
    async function testBatchProcessing() {
      const messages = document.getElementById('batchMessages').value.split('\n').filter(m => m.trim());
      if (messages.length === 0) {
        alert('请输入消息');
        return;
      }

      log(`开始批量处理 ${messages.length} 条消息...`, 'info');

      const resultsDiv = document.getElementById('batchResults');
      resultsDiv.classList.remove('hidden');
      resultsDiv.innerHTML = '<p class="text-gray-600">处理中...</p>';

      // 模拟批量处理
      for (let i = 0; i < messages.length; i++) {
        await new Promise(resolve => setTimeout(resolve, 500));
        log(`处理消息 ${i + 1}/${messages.length}`, 'info');
      }

      resultsDiv.innerHTML = messages.map((m, i) => `
        <div class="p-3 bg-green-50 rounded-lg border border-green-200">
          <div class="font-medium text-gray-900">消息 ${i + 1}</div>
          <div class="text-sm text-gray-600">${m}</div>
          <div class="text-xs text-green-700 mt-1">✅ 处理完成</div>
        </div>
      `).join('');

      log(`批量处理完成: ${messages.length} 条消息`, 'success');
    }

    // 初始化
    updateServiceStatus();
    updateAgentRegistry();
    log('平台服务演示页面已加载', 'success');
    log('所有服务状态正常', 'info');
  </script>
</body>
</html>
