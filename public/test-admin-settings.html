<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Settings Test - GLM API 配置管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">
  <div class="max-w-4xl mx-auto">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">🔧 Admin Settings Test</h1>
      <p class="text-gray-600">GLM API 配置管理系统</p>
    </div>

    <!-- Test Status -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">配置状态检查</h2>
      <div id="statusChecks" class="space-y-3"></div>
    </div>

    <!-- Quick Actions -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">快速操作</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <button onclick="testGlmConfig()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg">
          测试 GLM 配置
        </button>
        <button onclick="clearAllConfigs()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg">
          清除所有配置
        </button>
        <button onclick="exportConfigs()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg">
          导出配置
        </button>
        <button onclick="window.location.href='/admin'" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg">
          前往管理后台
        </button>
      </div>
    </div>

    <!-- Configuration Details -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <h3 class="text-lg font-semibold mb-4">🤖 GLM API 配置详情</h3>
      <div id="glmDetails" class="space-y-2 text-sm"></div>
    </div>

    <!-- Agent Configuration -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <h3 class="text-lg font-semibold mb-4">⚙️ Agent 系统配置</h3>
      <div id="agentDetails" class="space-y-2 text-sm"></div>
    </div>

    <!-- Test Results -->
    <div class="bg-white rounded-lg shadow p-6">
      <h3 class="text-lg font-semibold mb-4">📋 测试日志</h3>
      <div id="testLog" class="h-64 overflow-y-auto bg-gray-900 text-green-400 p-4 rounded font-mono text-sm"></div>
    </div>
  </div>

  <script>
    let logMessages = [];

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const prefix = {
        'info': 'ℹ️',
        'success': '✅',
        'error': '❌',
        'warning': '⚠️'
      }[type] || 'ℹ️';

      const logMessage = `[${timestamp}] ${prefix} ${message}`;
      logMessages.push(logMessage);

      const logDiv = document.getElementById('testLog');
      logDiv.innerHTML = logMessages.map(m => `<div>${m}</div>`).join('');
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function checkConfigStatus() {
      const statusChecks = document.getElementById('statusChecks');

      // Check GLM
      const glmKey = localStorage.getItem('ess_financial_settings');
      const glmConfig = glmKey ? JSON.parse(glmKey).glm : {};
      const glmConfigured = glmConfig.apiKey && glmConfig.apiKey.length > 0;

      statusChecks.innerHTML = `
        <div class="flex items-center justify-between p-3 rounded-lg border-2 ${
          glmConfigured ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200'
        }">
          <div class="flex items-center">
            <span class="text-2xl mr-3">${glmConfigured ? '✅' : '⚠️'}</span>
            <div>
              <div class="font-semibold">智谱 GLM API</div>
              <div class="text-sm text-gray-600">
                ${glmConfigured ? `已配置 (${glmConfig.model})` : '未配置'}
              </div>
            </div>
          </div>
        </div>
      `;

      // Update details
      document.getElementById('glmDetails').innerHTML = `
        <div><strong>API Key:</strong> ${glmConfig.apiKey ? '***' + glmConfig.apiKey.slice(-4) : '未设置'}</div>
        <div><strong>模型:</strong> ${glmConfig.model || 'glm-4-turbo'}</div>
        <div><strong>启用状态:</strong> ${glmConfig.enabled ? '✅' : '❌'}</div>
      `;

      // Agent config
      const agentSettings = JSON.parse(glmKey || '{}').agents || {};
      document.getElementById('agentDetails').innerHTML = `
        <div><strong>重试机制:</strong> ${agentSettings.retryConfig?.maxRetries > 0 ? '✅ 启用' : '❌ 禁用'}</div>
        <div><strong>最大重试次数:</strong> ${agentSettings.retryConfig?.maxRetries || 3}</div>
        <div><strong>速率限制:</strong> ${agentSettings.rateLimit?.enabled ? '✅ 启用' : '❌ 禁用'}</div>
        <div><strong>令牌桶容量:</strong> ${agentSettings.rateLimit?.capacity || 10}</div>
        <div><strong>填充速率:</strong> ${agentSettings.rateLimit?.refillRate || 2} 令牌/秒</div>
      `;
    }

    function testGlmConfig() {
      log('测试 GLM API 配置...', 'info');
      const settings = localStorage.getItem('ess_financial_settings');
      if (settings) {
        const glm = JSON.parse(settings).glm;
        if (glm.apiKey) {
          log(`GLM API 已配置: ${glm.model}`, 'success');
          log(`API Key: ***${glm.apiKey.slice(-4)}`, 'info');
        } else {
          log('GLM API 未配置', 'warning');
        }
      } else {
        log('未找到 GLM 配置', 'error');
      }
    }

    function clearAllConfigs() {
      if (confirm('确定要清除所有配置吗？此操作无法撤销。')) {
        localStorage.removeItem('ess_financial_settings');
        log('所有配置已清除', 'success');
        checkConfigStatus();
      }
    }

    function exportConfigs() {
      const configs = {
        timestamp: new Date().toISOString(),
        glm: JSON.parse(localStorage.getItem('ess_financial_settings') || '{}')
      };

      const blob = new Blob([JSON.stringify(configs, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `glm-configs-${new Date().toISOString().split('T')[0]}.json`;
      link.click();
      URL.revokeObjectURL(url);

      log('配置已导出', 'success');
    }

    // Initialize
    checkConfigStatus();
    log('GLM API 配置测试页面已加载', 'success');
    log('请访问 /admin 查看完整的配置界面', 'info');
  </script>
</body>
</html>
