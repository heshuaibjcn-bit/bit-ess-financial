<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="专业的工商业储能投资分析平台，提供IRR、NPV、投资回收期等关键指标计算" />
    <meta name="keywords" content="储能,投资分析,IRR,NPV,财务计算,能源存储" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA Install Prompt -->
    <script>
      // Prevent Chrome from showing the install prompt automatically
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        // Store the event for later use
        window.deferredPrompt = e;
      });

      // Show install prompt when needed
      window.showInstallPrompt = () => {
        if (window.deferredPrompt) {
          window.deferredPrompt.prompt();
          window.deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('PWA installed');
            }
            window.deferredPrompt = null;
          });
        }
      };
    </script>

    <title>ESS Financial - Energy Storage Investment Calculator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
