<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Console Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
        }
        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }
        .console {
            background: #1f2937;
            color: #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            padding: 8px;
            margin: 5px 0;
            border-left: 3px solid #6b7280;
        }
        .log-entry.request { border-left-color: #3b82f6; }
        .log-entry.response { border-left-color: #10b981; }
        .log-entry.error { border-left-color: #ef4444; }
        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .log-content {
            background: #111827;
            padding: 10px;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #2563eb;
        }
        .status {
            padding: 8px 15px;
            border-radius: 6px;
            background: #e5e7eb;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI智能体通信控制台测试</h1>
            <p>测试所有智能体与大模型的通信功能</p>
        </div>

        <!-- API Configuration -->
        <div class="test-section">
            <h2>⚙️ API配置</h2>
            <input type="password" id="apiKey" placeholder="输入智谱GLM API密钥"
                   style="padding: 10px; width: 400px; margin-right: 10px;">
            <button onclick="configureAPI()">配置密钥</button>
            <span id="apiStatus" class="status">未配置</span>
        </div>

        <!-- Statistics -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalRequests">0</div>
                <div class="stat-label">总请求数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="successRate">0%</div>
                <div class="stat-label">成功率</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTokens">0</div>
                <div class="stat-label">总Token数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgDuration">0ms</div>
                <div class="stat-label">平均响应时间</div>
            </div>
        </div>

        <!-- Agent Tests -->
        <div class="test-section">
            <h2>🧪 智能体测试</h2>
            <button onclick="testPolicyAgent()">测试政策更新智能体</button>
            <button onclick="testTariffAgent()">测试电价更新智能体</button>
            <button onclick="testDiligenceAgent()">测试尽职调查智能体</button>
            <button onclick="testSentimentAgent()">测试舆情分析智能体</button>
            <button onclick="clearLogs()">清空日志</button>
            <button onclick="exportLogs()">导出日志</button>
        </div>

        <!-- Console Display -->
        <div class="test-section">
            <h2>📺 实时通信日志</h2>
            <div class="console" id="console"></div>
        </div>
    </div>

    <script type="module">
        // Mock communication logger for testing
        class CommunicationLogger {
            constructor() {
                this.logs = [];
                this.subscribers = [];
            }

            log(agentType, direction, data) {
                const log = {
                    id: Date.now() + Math.random().toString(36).substr(2, 9),
                    timestamp: new Date().toISOString(),
                    agentType,
                    direction,
                    ...data
                };
                this.logs.unshift(log);
                this.notify();
                return log;
            }

            subscribe(callback) {
                this.subscribers.push(callback);
                callback(this.logs);
            }

            notify() {
                this.subscribers.forEach(cb => cb(this.logs));
            }

            getStats() {
                const requests = this.logs.filter(l => l.direction === 'request').length;
                const responses = this.logs.filter(l => l.direction === 'response').length;
                const errors = this.logs.filter(l => l.direction === 'error').length;
                const successRate = requests > 0 ? (responses / requests) * 100 : 0;
                const totalTokens = this.logs.reduce((sum, l) => sum + (l.tokens?.total || 0), 0);
                const avgDuration = this.logs
                    .filter(l => l.direction === 'response' && l.duration)
                    .reduce((sum, l) => sum + l.duration, 0) / responses || 0;

                return {
                    totalRequests: requests,
                    totalResponses: responses,
                    totalErrors: errors,
                    successRate,
                    totalTokens,
                    avgDuration
                };
            }

            clear() {
                this.logs = [];
                this.notify();
            }

            export() {
                const data = JSON.stringify(this.logs, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `agent-logs-${Date.now()}.json`;
                a.click();
            }
        }

        const logger = new CommunicationLogger();

        // API configuration
        function configureAPI() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                alert('请输入API密钥');
                return;
            }
            localStorage.setItem('glm_api_key', apiKey);
            document.getElementById('apiStatus').textContent = '已配置';
            document.getElementById('apiStatus').style.background = '#d1fae5';
            document.getElementById('apiStatus').style.color = '#065f46';
        }

        // Check API status on load
        window.addEventListener('DOMContentLoaded', () => {
            const apiKey = localStorage.getItem('glm_api_key');
            if (apiKey) {
                document.getElementById('apiKey').value = apiKey;
                document.getElementById('apiStatus').textContent = '已配置';
                document.getElementById('apiStatus').style.background = '#d1fae5';
                document.getElementById('apiStatus').style.color = '#065f46';
            }
        });

        // Subscribe to logger updates
        logger.subscribe((logs) => {
            updateConsole(logs);
            updateStats();
        });

        function updateConsole(logs) {
            const console = document.getElementById('console');
            console.innerHTML = logs.map(log => {
                const colorClass = log.direction === 'request' ? 'request' :
                                  log.direction === 'response' ? 'response' : 'error';
                const icon = log.direction === 'request' ? '📤' :
                             log.direction === 'response' ? '📥' : '❌';
                const time = new Date(log.timestamp).toLocaleTimeString();
                const content = log.direction === 'request' ?
                    (log.prompt || '').substring(0, 200) + (log.prompt?.length > 200 ? '...' : '') :
                    (log.response || log.error || '').substring(0, 200) + ((log.response || log.error || '')?.length > 200 ? '...' : '');

                return `
                    <div class="log-entry ${colorClass}">
                        <div class="log-header">
                            <span>${icon} ${log.agentType}</span>
                            <span>${time}</span>
                            ${log.tokens ? `<span>${log.tokens.total} tokens</span>` : ''}
                            ${log.duration ? `<span>${log.duration}ms</span>` : ''}
                        </div>
                        ${content ? `<div class="log-content">${content}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const stats = logger.getStats();
            document.getElementById('totalRequests').textContent = stats.totalRequests;
            document.getElementById('successRate').textContent = stats.successRate.toFixed(1) + '%';
            document.getElementById('totalTokens').textContent = stats.totalTokens.toLocaleString();
            document.getElementById('avgDuration').textContent = stats.avgDuration.toFixed(0) + 'ms';
        }

        // Test functions
        async function testPolicyAgent() {
            const agentType = 'PolicyUpdateAgent';
            logger.log(agentType, 'request', {
                model: 'glm-5-turbo',
                prompt: '请检查最新的储能政策变化...'
            });

            await simulateResponse(agentType, {
                model: 'glm-5-turbo',
                response: '已检查3个省份的政策变化，发现2项新政策。',
                tokens: { input: 50, output: 30, total: 80 },
                duration: 1500
            });
        }

        async function testTariffAgent() {
            const agentType = 'TariffUpdateAgent';
            logger.log(agentType, 'request', {
                model: 'glm-5-turbo',
                prompt: '请分析广东、浙江、江苏三省的电价变化...'
            });

            await simulateResponse(agentType, {
                model: 'glm-5-turbo',
                response: '已完成3省电价分析，发现平均上涨2.3%。',
                tokens: { input: 45, output: 35, total: 80 },
                duration: 1800
            });
        }

        async function testDiligenceAgent() {
            const agentType = 'DueDiligenceAgent';
            logger.log(agentType, 'request', {
                model: 'glm-5-turbo',
                prompt: '请对"示例科技有限公司"进行尽职调查...'
            });

            await simulateResponse(agentType, {
                model: 'glm-5-turbo',
                response: '已完成尽职调查，信用评级：AA，风险等级：低。',
                tokens: { input: 60, output: 40, total: 100 },
                duration: 2200
            });
        }

        async function testSentimentAgent() {
            const agentType = 'SentimentAnalysisAgent';
            logger.log(agentType, 'request', {
                model: 'glm-5-turbo',
                prompt: '请分析示例公司近期的舆情情况...'
            });

            await simulateResponse(agentType, {
                model: 'glm-5-turbo',
                response: '舆情评分：75分（正面），趋势：稳定上升。',
                tokens: { input: 55, output: 25, total: 80 },
                duration: 1200
            });
        }

        async function simulateResponse(agentType, data) {
            await new Promise(resolve => setTimeout(resolve, 1000 + Math.random() * 1000));
            logger.log(agentType, 'response', data);
        }

        function clearLogs() {
            logger.clear();
        }

        function exportLogs() {
            logger.export();
        }

        // Make functions available globally
        window.configureAPI = configureAPI;
        window.testPolicyAgent = testPolicyAgent;
        window.testTariffAgent = testTariffAgent;
        window.testDiligenceAgent = testDiligenceAgent;
        window.testSentimentAgent = testSentimentAgent;
        window.clearLogs = clearLogs;
        window.exportLogs = exportLogs;
    </script>
</body>
</html>
